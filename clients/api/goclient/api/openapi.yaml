      x-codegen-request-body-name: request
  /emoji/{emoji_id}:
    get:
      parameters:
      - description: Emoji filename ending in .webp
        in: path
        name: emoji_id
        required: true
        schema:
          type: string
      - description: Preferred rendered size
        in: query
        name: size
        schema:
          type: integer
      responses:
        "307":
          content:
            text/plain:
              schema:
                type: string
          description: Temporary Redirect
        "404":
          content:
            text/plain:
              schema:
                type: string
          description: Not found
      summary: Redirect to public emoji asset
      tags:
      - Emoji
