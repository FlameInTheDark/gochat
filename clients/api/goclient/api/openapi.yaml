          content:
            application/json:
              schema:
                type: string
          description: Registration email sent
        "302":
          content:
            application/json:
              schema:
                type: string
          description: User already exist
        "400":
          content:
            application/json:
              schema:
                type: string
          description: Incorrect request body
        "429":
          content:
            application/json:
              schema:
                type: string
          description: Try again later
        "500":
          content:
            application/json:
              schema:
                type: string
          description: Something bad happened
