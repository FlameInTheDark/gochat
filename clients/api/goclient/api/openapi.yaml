          '*/*':
            schema:
              $ref: '#/components/schemas/auth.PasswordResetRequest'
        description: Password reset data
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: Password reset successful
        "400":
          content:
            application/json:
              schema:
                type: string
          description: Incorrect request body
        "401":
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
