          description: Joined guild
        "401":
          content:
            application/json:
              schema:
                type: string
          description: unauthorized
        "404":
          content:
            application/json:
              schema:
                type: string
          description: invite not found
      summary: Accept invite and join guild
      tags:
      - Guild Invites
  /guild/invites/receive/{invite_code}:
