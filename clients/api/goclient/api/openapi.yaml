servers:
- url: http://localhost/api/v1
- url: https://localhost/api/v1
paths:
  /auth/confirmation:
    post:
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/auth.ConfirmationRequest'
        description: Login data
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                type: string
          description: "Registration completed, account created"
        "400":
          content:
            application/json:
              schema:
                type: string
          description: Incorrect request body
        "401":
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        "409":
          content:
            application/json:
              schema:
                type: string
          description: Discriminator is not unique
        "500":
          content:
            application/json:
              schema:
                type: string
          description: Something bad happened
      summary: Confirmation
      tags:
      - Auth
      x-codegen-request-body-name: request
  /auth/login:
    post:
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/auth.LoginRequest'
        description: Login data
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth.LoginResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                type: string
          description: Incorrect request body
        "401":
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                type: string
          description: Something bad happened
      summary: Authentication
      tags:
      - Auth
      x-codegen-request-body-name: request
  /auth/recovery:
    post:
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/auth.PasswordRecoveryRequest'
        description: Email for password recovery
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                type: string
          description: Recovery email sent
        "400":
          content:
            application/json:
              schema:
                type: string
          description: Incorrect request body
        "404":
          content:
            application/json:
              schema:
                type: string
          description: Email not found
        "409":
          content:
            application/json:
              schema:
                type: string
          description: Recovery email already sent
        "410":
          content:
            application/json:
              schema:
                type: string
          description: User is banned
        "429":
          content:
            application/json:
              schema:
                type: string
          description: Try again later
        "500":
          content:
            application/json:
              schema:
                type: string
          description: Something bad happened
      summary: Password Recovery
      tags:
      - Auth
      x-codegen-request-body-name: request
  /auth/refresh:
    get:
      parameters:
      - description: Refresh token instead of auth
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth.RefreshTokenResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                type: string
          description: Incorrect request body
        "401":
          content:
            application/json:
              schema:
                type: string
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                type: string
          description: Something bad happened
      summary: Refresh authentication token
      tags:
      - Auth
  /auth/registration:
